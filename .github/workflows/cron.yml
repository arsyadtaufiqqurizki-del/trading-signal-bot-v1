name: Hourly Auto-Scan /high

on:
  schedule:
    - cron: '0 * * * *' # Setiap jam, menit ke-0
  workflow_dispatch: # Bisa dipicu manual dari GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloud Run Cron Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.CLOUD_RUN_URL }}/api/cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
