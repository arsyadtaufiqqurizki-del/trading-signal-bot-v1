name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/arsyad-trading-bot/trading-bot-repo/bot:latest .
          docker push asia-southeast1-docker.pkg.dev/arsyad-trading-bot/trading-bot-repo/bot:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trading-bot
          region: asia-southeast2
          image: asia-southeast1-docker.pkg.dev/arsyad-trading-bot/trading-bot-repo/bot:latest
